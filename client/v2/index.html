<!DOCTYPE html>
<html>
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>🧱 Lego | Predictability of a lego set deal</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 20px; }
      section { margin-bottom: 20px; }
      select, button { margin: 5px; padding: 5px; }
      .deal { border: 1px solid #ccc; padding: 10px; margin: 10px 0; }
      .deal img { max-width: 100px; }
    </style>
  </head>
  <body>
    <h1>Lego Deals</h1>
    <section id="options">
      <div id="show">
        <label for="show-select">Show:</label>
        <select name="show" id="show-select">
          <option value="6">6</option>
          <option value="12">12</option>
          <option value="24">24</option>
        </select>
      </div>
      <div id="page">
        <label for="page-select">Go to page:</label>
        <select name="page" id="page-select"> </select>
      </div>
      <div id="filters">
        <button id="best-discount">By best discount</button>
        <button id="most-commented">By most commented</button>
        <button id="hot-deals">By hot deals</button>
      </div>
      <div id="sort">
        <label for="sort-select">Sort:</label>
        <select name="sort" id="sort-select">
          <option value="price-asc">Cheaper</option>
          <option value="price-desc">Expensive</option>
          <option value="date-asc">Recently published</option>
          <option value="date-desc">Anciently published</option>
        </select>
      </div>
    </section>
    <section id="lego">
      <h2>Lego sets</h2>
      <div>
        <label>Lego set id:</label>
        <select id="lego-set-id-select"></select>
        <button id="load-sales">Load Sales</button>
      </div>
    </section>
    <section id="indicators">
      <h2>Indicators</h2>
      <div>
        <span>Number of deals</span>
        <span id="nbDeals">0</span>
      </div>
      <div>
        <span>Number of sales</span>
        <span id="nbSales">0</span>
      </div>
      <div>
        <span>p5 sales price value</span>
        <span id="p5Price">0</span>
      </div>
      <div>
        <span>p25 sales price value</span>
        <span id="p25Price">0</span>
      </div>
      <div>
        <span>p50 sales price value</span>
        <span id="p50Price">0</span>
      </div>
      <div>
        <span>Average sales price</span>
        <span id="avgPrice">0</span>
      </div>
    </section>
    <section id="deals">
      <h2>Deals</h2>
      <div id="deals-container"></div>
    </section>
    <section id="sales">
      <h2>Sales</h2>
      <div id="sales-container"></div>
    </section>
    <script type="text/javascript" charset="UTF-8" src="data.js"></script>
    <script type="text/javascript" charset="UTF-8" src="portfolio.js"></script>
  </body>
</html>
