<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Theo's Legos | Dark Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
  </head>
  <body>
    <!-- Top Navigation Bar -->
    <header class="dark-header">
      <div class="header-container">
        <div class="logo">
          <h1>THEO'S LEGOS</h1>
        </div>
      </div>
    </header>

    <!-- Hero Banner -->
    <section class="hero-banner">
      <div class="hero-content">
        <h2>Découvrez les meilleures affaires LEGO®</h2>
        <p>Economisez sur vos prochains sets</p>
      </div>
    </section>

    <main class="dark-main">
      <!-- Horizontal Filters Bar -->
      <section class="filters-bar">
        <!-- Display / Pagination -->
        <div class="filter-group">
          <label>Affichage:</label>
          <select id="show-select">
            <option value="6">6</option>
            <option value="12">12</option>
            <option value="24">24</option>
          </select>
          <label>Page:</label>
          <select id="page-select"></select>
        </div>

        <!-- Sort -->
        <div class="filter-group">
          <label>Trier:</label>
          <select id="sort-select">
            <option value="price-asc">Prix croissant</option>
            <option value="price-desc">Prix décroissant</option>
            <option value="date-asc">Plus récents</option>
            <option value="date-desc">Plus anciens</option>
          </select>
        </div>

        <!-- Quick Filters -->
        <div class="filter-group quick-filters" id="filters">
          <button id="best-discount" class="btn-filter">Les -50%</button>
          <button id="most-commented" class="btn-filter">Les + Commentés</button>
          <button id="hot-deals" class="btn-filter">Hot Deals</button>
        </div>

        <div class="filter-group scrape-group">
          <button id="scrape-deals" class="btn-action">Scraper Dealabs</button>
        </div>
      </section>

      <!-- Stats Bar -->
      <section class="stats-bar">
        <div class="stat-container">
          <label>Deals:</label> <span id="nbDeals" class="stat-highlight">0</span>
        </div>
        <div class="stat-container">
          <label>Set ID (Vinted):</label>
          <select id="lego-set-id-select"></select>
          <button id="load-sales" class="btn-filter mini">Analyser</button>
        </div>
        <div class="stat-container">
          <label>Ventes:</label> <span id="nbSales" class="stat-highlight">0</span>
        </div>
        <div class="stat-container">
          <label>Moyenne:</label> <span id="avgPrice" class="stat-highlight">0€</span>
        </div>
        <div class="stat-container">
          <label>P5 / P25 / P50:</label> 
          <span class="stat-highlight"><span id="p5Price">0</span> | <span id="p25Price">0</span> | <span id="p50Price">0</span></span>
        </div>
      </section>

      <!-- Deals Grid -->
      <section class="deals-section">
        <h2 class="section-title">All Deals</h2>
        <div id="deals-container" class="products-grid">
          <!-- Deals injected via portfolio.js -->
        </div>
      </section>

      <!-- Sales Grid -->
      <section class="sales-section">
        <h2 class="section-title">Vinted Market Sales</h2>
        <div id="sales-container" class="products-grid sales-grid">
          <!-- Sales injected via portfolio.js -->
        </div>
      </section>
    </main>

    <footer class="dark-footer">
      <p>© 2026 Theo's Legos - Dark Edition</p>
    </footer>

    <script type="text/javascript" charset="UTF-8" src="data.js"></script>
    <script type="text/javascript" charset="UTF-8" src="portfolio.js"></script>
  </body>
</html>
